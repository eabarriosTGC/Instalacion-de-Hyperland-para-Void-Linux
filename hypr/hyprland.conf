## ───────────────────────────────────────────
##  Hyprland config - Void Linux
##  Tema: Catppuccin Mocha (mismo que nixos-config de lawrab)
## ───────────────────────────────────────────

# --- Monitores ---
# Ajustá según tu pantalla. "preferred" detecta resolución/refresh automático.
monitor=,preferred,auto,1

# --- Variables de entorno (Wayland) ---
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GDK_BACKEND,wayland,x11
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- Autostart ---
exec-once = waybar
exec-once = mako
exec-once = hypridle
exec-once = hyprpaper
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd --all

# --- Input ---
input {
    kb_layout = latam
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2

    # Catppuccin Mocha: borde activo (lavender -> mauve), inactivo (surface1)
    col.active_border = rgba(b4befecc) rgba(cba6f7cc) 45deg
    col.inactive_border = rgba(45475aaa)

    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 12

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(11111bcc)
    }

    active_opacity = 1.0
    inactive_opacity = 0.92
}

animations {
    enabled = true

    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothIn, 0.26, 0.09, 0.31, 1

    animation = windows, 1, 5, overshot
    animation = windowsOut, 1, 5, smoothIn, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 5, smoothIn
    animation = workspaces, 1, 5, overshot
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

gestures {
    workspace_swipe = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# --- Programas por defecto ---
$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun

# --- Keybindings ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen,
bind = $mainMod, L, exec, hyprlock

# Screenshots (grim + slurp)
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = SHIFT, Print, exec, grim - | swappy -f -

# Mover foco entre ventanas (vim-like)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Cambiar de workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover ventana activa a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Mouse para mover/redimensionar ventanas flotantes
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volumen / brillo (requiere pamixer / brightnessctl)
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindel = , XF86AudioMute, exec, pamixer -t
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
